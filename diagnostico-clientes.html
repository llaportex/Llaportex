<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diagnóstico Clientes</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;padding:16px;background:#f5f5f5}
h2{margin-bottom:12px}
.card{background:#fff;border-radius:8px;padding:12px;margin-bottom:12px;border:1px solid #ddd}
pre{font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
button{padding:10px 20px;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-bottom:16px}
</style>
</head>
<body>
<h2>🔍 Diagnóstico Clientes Supabase</h2>
<button onclick="cargar()">Cargar clientes</button>
<div id="out"></div>
<script>
var SUPA_URL = 'https://kcmnrnmgjapgjbiadvrc.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjbW5ybm1namFwZ2piaWFkdnJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjYzOTQsImV4cCI6MjA5MDUwMjM5NH0.cMNilqwlCO_pHfxn8mMoHF-gngLqpXJRMCWRGAL9Pks';

async function cargar() {
  var out = document.getElementById('out');
  out.innerHTML = '<p>Cargando...</p>';
  try {
    var supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    var r = await supa.from('clientes').select('*').limit(5).order('empresa');
    
    if (r.error) {
      out.innerHTML = '<div class="card"><strong>ERROR:</strong> ' + JSON.stringify(r.error) + '</div>';
      return;
    }
    
    var html = '<h3>Primeros ' + r.data.length + ' clientes:</h3>';
    r.data.forEach(function(c) {
      html += '<div class="card">';
      html += '<strong>' + c.empresa + '</strong><br>';
      html += '<strong>TODOS LOS CAMPOS:</strong>';
      html += '<pre>' + JSON.stringify(c, null, 2) + '</pre>';
      html += '</div>';
    });
    out.innerHTML = html;
  } catch(e) {
    out.innerHTML = '<div class="card"><strong>ERROR:</strong> ' + e.message + '</div>';
  }
}
</script>
</body>
</html>
